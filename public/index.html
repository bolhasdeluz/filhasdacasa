<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Filhas da Casa</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Nunito:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --pink:     #c4396b;
      --pink2:    #e8688a;
      --pink-dim: rgba(196,57,107,0.08);
      --pink-bd:  rgba(196,57,107,0.2);
      --dark:     #8a1a40;
      --text:     #2a1a22;
      --muted:    #8a5060;
      --dim:      #c0909a;
      --surface:  #ffffff;
      --surface2: #fff5f8;
      --border:   rgba(196,57,107,0.15);
      --r:        14px;
      --pw:       370px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: transparent;
      color: var(--text);
      font-family: 'Nunito', sans-serif;
      min-height: 100vh;
      padding-bottom: 4rem;
      overflow-x: hidden;
    }

    /* HEADER */
    .btn-back { display:inline-block; margin-bottom:14px; font-family:'Cinzel',serif; font-size:10px; letter-spacing:0.1em; color:rgba(255,255,255,0.7); text-decoration:none; border:1px solid rgba(255,255,255,0.4); padding:5px 14px; border-radius:20px; transition:all 0.2s; }
    .btn-back:hover { border-color:#fff; color:#fff; }
    header { padding: 2rem 2rem 0.5rem; text-align: center; }
    header h1 { font-family:'Cinzel',serif; font-size:clamp(1.6rem,4vw,2.4rem); font-weight:700; color:#ffffff; letter-spacing:0.06em; text-shadow:0 2px 20px rgba(0,0,0,0.2); }
    header .sub { font-size:0.7rem; color:rgba(255,255,255,0.6); letter-spacing:0.25em; text-transform:uppercase; margin-top:0.4rem; }

    /* SEARCH */
    .search-wrap { max-width:440px; margin:1.5rem auto 0; padding:0 1.5rem; }
    .search-wrap input { width:100%; background:#ffffff; border:1px solid rgba(196,57,107,0.25); border-radius:40px; padding:0.7rem 1.3rem; color:var(--text); font-family:'Nunito',sans-serif; font-size:0.9rem; outline:none; transition:border-color 0.2s,box-shadow 0.2s; }
    .search-wrap input::placeholder { color:var(--dim); }
    .search-wrap input:focus { border-color:var(--pink); box-shadow:0 0 0 3px rgba(196,57,107,0.1); }

    /* GRID */
    #grid { max-width:1060px; margin:1.5rem auto 0; padding:0 1.5rem; display:grid; grid-template-columns:repeat(auto-fill,minmax(210px,1fr)); gap:1rem; }

    /* CARD */
    .card { background:#ffffff; border:1px solid var(--border); border-radius:var(--r); padding:1.3rem 1.2rem 1.1rem; cursor:pointer; position:relative; overflow:hidden; animation:fadeUp 0.4s ease both; transition:transform 0.2s,box-shadow 0.2s,border-color 0.2s; }
    @keyframes fadeUp { from{opacity:0;transform:translateY(14px)} to{opacity:1;transform:translateY(0)} }
    .card:hover { transform:translateY(-3px); box-shadow:0 12px 36px rgba(196,57,107,0.15); border-color:rgba(196,57,107,0.35); }
    .card-avatar { width:52px;height:52px;border-radius:50%;object-fit:cover;background:var(--surface2);border:2px solid var(--border);display:block;margin-bottom:0.85rem; }
    .card-avatar-placeholder { width:52px;height:52px;border-radius:50%;background:var(--surface2);border:2px solid var(--border);margin-bottom:0.85rem;display:flex;align-items:center;justify-content:center;font-size:1.3rem; }
    .card-name { font-family:'Cinzel',serif; font-size:1rem; font-weight:600; color:var(--dark); margin-bottom:0.2rem; line-height:1.3; }
    .card-cargo { font-size:0.7rem; color:var(--muted); text-transform:uppercase; letter-spacing:0.08em; margin-bottom:0.5rem; }
    .card-tempo { font-size:0.78rem; color:var(--pink); font-weight:600; margin-bottom:0.85rem; }
    .card-guides { display:flex; flex-wrap:wrap; gap:0.3rem; }
    .guide-chip { font-size:0.72rem; padding:0.12rem 0.5rem; border-radius:20px; background:var(--pink-dim); color:var(--muted); border:1px solid var(--border); }
    .card-cta { position:absolute; bottom:1rem; right:1.1rem; font-size:0.68rem; color:var(--pink); opacity:0; transition:opacity 0.2s; pointer-events:none; font-family:'Cinzel',serif; letter-spacing:0.06em; }
    .card:hover .card-cta { opacity:1; }

    /* LOADING */
    #loading { text-align:center; padding:4rem 2rem; color:rgba(255,255,255,0.7); }
    .spinner { width:32px;height:32px;border:2px solid rgba(255,255,255,0.2);border-top-color:#fff;border-radius:50%;animation:spin 0.7s linear infinite;margin:0 auto 1rem; }
    @keyframes spin { to{transform:rotate(360deg)} }

    /* OVERLAY */
    #overlay { position:fixed;inset:0;background:rgba(40,10,20,0.45);backdrop-filter:blur(3px);z-index:100;opacity:0;pointer-events:none;transition:opacity 0.3s; }
    #overlay.on { opacity:1;pointer-events:all; }

    /* GUIDE PANEL */
    #guide-panel { position:fixed;top:0;right:0;bottom:0;width:var(--pw);max-width:100vw;background:#ffffff;border-left:1px solid var(--border);z-index:110;transform:translateX(100%);transition:transform 0.35s cubic-bezier(0.4,0,0.2,1);display:flex;flex-direction:column;box-shadow:-8px 0 40px rgba(196,57,107,0.1); }
    #guide-panel.open { transform:translateX(0); }
    .panel-hd { padding:1.4rem 1.4rem 1.1rem;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:1rem; }
    .panel-hd img,.panel-hd .phd-ph { width:46px;height:46px;border-radius:50%;object-fit:cover;background:var(--surface2);border:1px solid var(--border);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:1.2rem; }
    .panel-hd-info { flex:1;min-width:0; }
    .panel-hd-info h2 { font-family:'Cinzel',serif;font-size:1rem;font-weight:600;color:var(--dark);white-space:nowrap;overflow:hidden;text-overflow:ellipsis; }
    .panel-hd-info p { font-size:0.7rem;color:var(--muted); }
    .panel-hd-info .ptempo { font-size:0.75rem;color:var(--pink);font-weight:600;margin-top:0.15rem; }
    .panel-close { background:none;border:none;color:var(--muted);cursor:pointer;font-size:1rem;padding:0.4rem;border-radius:6px;transition:color 0.2s,background 0.2s;flex-shrink:0; }
    .panel-close:hover { color:var(--dark);background:var(--pink-dim); }
    .panel-body { flex:1;overflow-y:auto;padding:1.1rem 1.2rem; }
    .panel-body::-webkit-scrollbar { width:3px; }
    .panel-body::-webkit-scrollbar-thumb { background:var(--border);border-radius:3px; }
    .panel-label { font-size:0.62rem;text-transform:uppercase;letter-spacing:0.18em;color:var(--dim);margin-bottom:0.65rem;margin-top:0.8rem; font-family:'Cinzel',serif; }
    .panel-label:first-child { margin-top:0; }

    /* GUIDE ROW */
    .guide-row { display:flex;align-items:center;gap:0.75rem;padding:0.7rem 0.8rem;border-radius:10px;background:var(--surface2);border:1px solid var(--border);margin-bottom:0.45rem;cursor:pointer;transition:background 0.18s,border-color 0.18s,transform 0.15s; }
    .guide-row:hover { background:#ffe8f0;border-color:rgba(196,57,107,0.3);transform:translateX(2px); }
    .guide-icon { font-size:1.1rem;width:30px;height:30px;display:flex;align-items:center;justify-content:center;background:rgba(196,57,107,0.08);border-radius:7px;flex-shrink:0; }
    .guide-row-info { flex:1;min-width:0; }
    .guide-row-type { font-size:0.62rem;text-transform:uppercase;letter-spacing:0.1em;color:var(--muted); }
    .guide-row-name { font-size:0.88rem;font-weight:600;color:var(--dark);white-space:nowrap;overflow:hidden;text-overflow:ellipsis; }
    .note-dot { width:6px;height:6px;border-radius:50%;background:var(--pink);flex-shrink:0;opacity:0;transition:opacity 0.2s; }
    .note-dot.on { opacity:1; }
    .guide-arrow { font-size:0.8rem;color:var(--dim); }

    /* NOTES MODAL */
    #notes-modal { position:fixed;inset:0;z-index:200;display:flex;align-items:center;justify-content:center;padding:1rem;opacity:0;pointer-events:none;transition:opacity 0.25s; }
    #notes-modal.open { opacity:1;pointer-events:all; }
    .mbackdrop { position:absolute;inset:0;background:rgba(40,10,20,0.45);backdrop-filter:blur(8px); }
    .mbox { position:relative;background:#ffffff;border:1px solid var(--border);border-top:3px solid var(--pink);border-radius:16px;width:100%;max-width:430px;padding:1.8rem;box-shadow:0 20px 60px rgba(196,57,107,0.15);transform:scale(0.95) translateY(10px);transition:transform 0.25s cubic-bezier(0.4,0,0.2,1); }
    #notes-modal.open .mbox { transform:scale(1) translateY(0); }
    .m-icon { font-size:2rem;margin-bottom:0.6rem; }
    .m-type { font-size:0.65rem;text-transform:uppercase;letter-spacing:0.15em;color:var(--muted);margin-bottom:0.2rem;font-family:'Cinzel',serif; }
    .m-guide-name { font-family:'Cinzel',serif;font-size:1.2rem;font-weight:700;color:var(--dark);margin-bottom:0.3rem; }
    .m-for { font-size:0.75rem;color:var(--muted);margin-bottom:1.2rem; }
    .m-for span { color:var(--pink);font-weight:600; }
    #note-text { width:100%;min-height:110px;background:var(--surface2);border:1px solid var(--pink-bd);border-radius:10px;color:var(--text);font-family:'Nunito',sans-serif;font-size:0.88rem;padding:0.85rem 1rem;resize:vertical;outline:none;transition:border-color 0.2s;line-height:1.65; }
    #note-text::placeholder { color:var(--dim); }
    #note-text:focus { border-color:var(--pink); }
    .ponto-label { font-size:0.65rem;letter-spacing:0.15em;text-transform:uppercase;color:var(--muted);margin:14px 0 4px;display:block;font-family:'Cinzel',serif; }
    .ponto-obs { font-size:0.75rem;color:var(--dim);font-style:italic;margin-bottom:6px;opacity:0.8;display:block; }
    #ponto-link-input { width:100%;background:var(--surface2);border:1px solid var(--pink-bd);border-radius:8px;padding:9px 12px;color:var(--text);font-size:0.88rem;font-family:inherit;outline:none;transition:border-color 0.2s; }
    #ponto-link-input:focus { border-color:var(--pink); }
    #ponto-link-input::placeholder { color:var(--dim); }
    .m-actions { display:flex;gap:0.6rem;margin-top:0.9rem;align-items:center; }
    .save-ok { font-size:0.75rem;color:var(--pink);margin-right:auto;opacity:0;transition:opacity 0.3s;flex:1; }
    .save-ok.on { opacity:1; }
    .btn { padding:0.52rem 1.1rem;border-radius:8px;font-family:'Nunito',sans-serif;font-size:0.83rem;font-weight:700;cursor:pointer;border:none;transition:background 0.2s,transform 0.12s; }
    .btn:active { transform:scale(0.96); }
    .btn-ghost { background:transparent;border:1px solid var(--border);color:var(--muted); }
    .btn-ghost:hover { background:var(--pink-dim);color:var(--dark); }
    .btn-primary { background:var(--dark);color:#fff; }
    .btn-primary:hover { background:var(--pink); }
    .btn-primary:disabled { opacity:0.5;cursor:default; }

    /* EMPTY */
    .empty { text-align:center;padding:3rem 1rem;color:rgba(255,255,255,0.6);font-size:0.9rem; }

    /* MOBILE */
    @media (max-width:520px) {
      :root { --pw:100vw; }
      #guide-panel { top:auto;border-left:none;border-top:1px solid var(--border);border-radius:20px 20px 0 0;height:82vh;transform:translateY(100%); }
      #guide-panel.open { transform:translateY(0); }
    }
  </style>
</head>
<body>

<div class="search-wrap">
  <input type="search" id="search" placeholder="🔍  Buscar por nome ou cargo..." autocomplete="off">
</div>

<div id="loading"><div class="spinner"></div><p>Carregando...</p></div>
<div id="grid" style="display:none;"></div>
<div id="overlay"></div>

<div id="guide-panel">
  <div class="panel-hd">
    <div id="phd-avatar"></div>
    <div class="panel-hd-info">
      <h2 id="phd-name"></h2>
      <p id="phd-cargo"></p>
      <p class="ptempo" id="phd-tempo"></p>
    </div>
    <button class="panel-close" id="panel-close">✕</button>
  </div>
  <div class="panel-body" id="panel-body"></div>
</div>

<div id="notes-modal">
  <div class="mbackdrop" id="mbackdrop"></div>
  <div class="mbox">
    <div class="m-icon" id="m-icon"></div>
    <div class="m-type" id="m-type"></div>
    <div class="m-guide-name" id="m-gname"></div>
    <div class="m-for" id="m-for"></div>
    <textarea id="note-text" placeholder="Observações, histórico, detalhes sobre este guia..."></textarea>
    <span class="ponto-label">🎵 Link do Ponto Cantado</span>
    <span class="ponto-obs">Adicione apenas pontos já ensinados pelos guias em sessão</span>
    <input type="url" id="ponto-link-input" placeholder="https://pontoscantados.pages.dev/...">
    <div class="m-actions">
      <span class="save-ok" id="save-ok">✓ Salvo</span>
      <button class="btn btn-ghost" id="m-close">Cancelar</button>
      <button class="btn btn-primary" id="m-save">Salvar nota</button>
    </div>
  </div>
</div>

<script>
(function () {
  const GUIDES = [
    { key: 'x_studio_caboclo',     type: 'Caboclo',     icon: '🏹' },
    { key: 'x_studio_exu',         type: 'Exu',         icon: '🔱' },
    { key: 'x_studio_pomba_gira',  type: 'Pomba Gira',  icon: '🌹' },
    { key: 'x_studio_preto_velho', type: 'Preto Velho', icon: '🕯️' },
    { key: 'x_studio_cigana',      type: 'Cigana',      icon: '🔮' },
    { key: 'x_studio_cosme',       type: 'Cosme',       icon: '⭐' },
  ];

  function tempo(d) {
    if (!d) return null;
    const s = new Date(d + 'T12:00:00'), n = new Date();
    let y = n.getFullYear() - s.getFullYear();
    let m = n.getMonth() - s.getMonth();
    let dd = n.getDate() - s.getDate();
    if (dd < 0) { m--; dd += new Date(n.getFullYear(), n.getMonth(), 0).getDate(); }
    if (m  < 0) { y--; m += 12; }
    const p = [];
    if (y > 0) p.push(y + (y === 1 ? ' ano' : ' anos'));
    if (m > 0) p.push(m + (m === 1 ? ' mês' : ' meses'));
    return p.length ? p.join(' e ') : (dd > 0 ? dd + ' dia(s)' : 'Hoje!');
  }

  function nk(id, key) { return `p${id}_${key}`; }

  async function getNote(k) {
    try { const r = await fetch(`/api/notes?key=${encodeURIComponent(k)}`); return (await r.json()).text || ''; }
    catch { return ''; }
  }

  async function putNote(k, txt) {
    await fetch('/api/notes', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({key:k,text:txt}) });
  }

  let partners = [], currentPartner = null, noteCache = {}, pontoLinkCache = {}, curKey = null;

  function renderCards(list) {
    const g = document.getElementById('grid');
    g.innerHTML = '';
    if (!list.length) { g.innerHTML = '<div class="empty">Nenhuma filha encontrada.</div>'; return; }
    list.forEach((p, i) => {
      const t = tempo(p.x_studio_data_da_iniciacao);
      const guides = GUIDES.filter(g => p[g.key]);
      const card = document.createElement('div');
      card.className = 'card';
      card.style.animationDelay = (i * 0.035) + 's';
      const avatarHTML = p.image_128
        ? `<img class="card-avatar" src="data:image/png;base64,${p.image_128}" alt="">`
        : `<div class="card-avatar-placeholder">✨</div>`;
      const chips = guides.map(g => `<span class="guide-chip">${g.icon} ${g.type}</span>`).join('');
      const passCount = (p.passagens_nomes || []).filter(Boolean).length;
      const passChip = passCount ? `<span class="guide-chip">✨ ${passCount} passagen${passCount > 1 ? 's' : ''}</span>` : '';
      card.innerHTML = `
        ${avatarHTML}
        <div class="card-name">${p.name || ''}</div>
        ${p.function ? `<div class="card-cargo">${p.function}</div>` : ''}
        ${t ? `<div class="card-tempo">✦ ${t} de casa</div>` : ''}
        ${chips || passChip ? `<div class="card-guides">${chips}${passChip}</div>` : ''}
        <div class="card-cta">Ver guias →</div>
      `;
      card.addEventListener('click', () => openPanel(p));
      g.appendChild(card);
    });
  }

  async function openPanel(p) {
    currentPartner = p;
    const ava = document.getElementById('phd-avatar');
    if (p.image_128) {
      ava.innerHTML = `<img src="data:image/png;base64,${p.image_128}" style="width:46px;height:46px;border-radius:50%;object-fit:cover;border:1px solid var(--border);">`;
    } else {
      ava.innerHTML = `<div class="phd-ph" style="width:46px;height:46px;border-radius:50%;background:var(--surface2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:1.2rem;">✨</div>`;
    }
    document.getElementById('phd-name').textContent = p.name || '';
    document.getElementById('phd-cargo').textContent = p.function || '';
    const t = tempo(p.x_studio_data_da_iniciacao);
    document.getElementById('phd-tempo').textContent = t ? `✦ ${t} de casa` : '';
    const body = document.getElementById('panel-body');
    body.innerHTML = '<div class="empty" style="padding:1.5rem 0"><div class="spinner" style="width:24px;height:24px;border-width:2px;border-color:var(--border);border-top-color:var(--pink);"></div></div>';
    const active = GUIDES.filter(g => p[g.key]);
    const passagens = (p.passagens_nomes || []).map((nome, i) => ({ nome, data: (p.passagens_datas || [])[i] || null })).filter(ps => ps.nome);
    const allKeys = [...active.map(g => nk(p.id, g.key)), ...passagens.map((_, i) => nk(p.id, `passagem_${i}`))];
    await Promise.all(allKeys.map(async k => {
      if (noteCache[k] === undefined) noteCache[k] = await getNote(k);
      if (pontoLinkCache[k] === undefined) pontoLinkCache[k] = await getNote('ponto:' + k);
    }));
    body.innerHTML = '';
    if (!active.length && !passagens.length) {
      body.innerHTML = '<div class="empty" style="color:var(--muted)">Nenhum guia registrado.</div>';
    } else {
      if (active.length) {
        const lbl = document.createElement('p'); lbl.className = 'panel-label'; lbl.textContent = 'Guias — clique para ver ou adicionar notas'; body.appendChild(lbl);
        active.forEach(g => {
          const k = nk(p.id, g.key);
          const row = document.createElement('div'); row.className = 'guide-row'; row.dataset.key = k;
          row.innerHTML = `<div class="guide-icon">${g.icon}</div><div class="guide-row-info"><div class="guide-row-type">${g.type}</div><div class="guide-row-name">${p[g.key]}</div></div><div class="note-dot ${noteCache[k] ? 'on' : ''}" title="Tem notas"></div><div class="guide-arrow">›</div>`;
          row.addEventListener('click', () => openModal(p, { key: g.key, type: g.type, icon: g.icon, _nome: p[g.key] }, k));
          body.appendChild(row);
        });
      }
      if (passagens.length) {
        const lbl2 = document.createElement('p'); lbl2.className = 'panel-label'; lbl2.style.marginTop = active.length ? '1.2rem' : '0'; lbl2.textContent = 'Passagens — clique para ver ou adicionar notas'; body.appendChild(lbl2);
        passagens.forEach((ps, i) => {
          const k = nk(p.id, `passagem_${i}`);
          const row = document.createElement('div'); row.className = 'guide-row'; row.dataset.key = k;
          row.innerHTML = `<div class="guide-icon">✨</div><div class="guide-row-info"><div class="guide-row-type">Passagem${ps.data ? ' · ' + ps.data : ''}</div><div class="guide-row-name">${ps.nome}</div></div><div class="note-dot ${noteCache[k] ? 'on' : ''}" title="Tem notas"></div><div class="guide-arrow">›</div>`;
          row.addEventListener('click', () => openModal(p, { key: null, type: 'Passagem', icon: '✨', _nome: ps.nome }, k));
          body.appendChild(row);
        });
      }
    }
    document.getElementById('overlay').classList.add('on');
    document.getElementById('guide-panel').classList.add('open');
  }

  function closePanel() { document.getElementById('overlay').classList.remove('on'); document.getElementById('guide-panel').classList.remove('open'); currentPartner = null; }

  function openModal(p, guide, k) {
    curKey = k;
    document.getElementById('m-icon').textContent = guide.icon;
    document.getElementById('m-type').textContent = guide.type;
    document.getElementById('m-gname').textContent = guide._nome || (guide.key ? p[guide.key] : '');
    document.getElementById('m-for').innerHTML = `Filha: <span>${p.name}</span>`;
    document.getElementById('note-text').value = noteCache[k] || '';
    document.getElementById('ponto-link-input').value = pontoLinkCache[k] || '';
    document.getElementById('save-ok').classList.remove('on');
    document.getElementById('m-save').textContent = 'Salvar nota';
    document.getElementById('m-save').disabled = false;
    document.getElementById('notes-modal').classList.add('open');
  }

  function closeModal() { document.getElementById('notes-modal').classList.remove('open'); curKey = null; }

  document.getElementById('panel-close').addEventListener('click', closePanel);
  document.getElementById('overlay').addEventListener('click', closePanel);
  document.getElementById('m-close').addEventListener('click', closeModal);
  document.getElementById('mbackdrop').addEventListener('click', closeModal);

  document.getElementById('m-save').addEventListener('click', async () => {
    const txt = document.getElementById('note-text').value;
    const btn = document.getElementById('m-save');
    btn.disabled = true; btn.textContent = '...';
    try {
      const pontoLink = document.getElementById('ponto-link-input').value.trim();
      await putNote(curKey, txt);
      await putNote('ponto:' + curKey, pontoLink);
      noteCache[curKey] = txt; pontoLinkCache[curKey] = pontoLink;
      const row = document.querySelector(`[data-key="${curKey}"] .note-dot`);
      if (row) row.classList.toggle('on', !!txt);
      const ok = document.getElementById('save-ok'); ok.classList.add('on');
      setTimeout(() => ok.classList.remove('on'), 2500);
      btn.textContent = '✓ Salvo';
      setTimeout(() => { btn.textContent = 'Salvar nota'; btn.disabled = false; }, 1600);
    } catch { btn.textContent = 'Erro — tentar novamente'; btn.disabled = false; }
  });

  document.getElementById('search').addEventListener('input', function () {
    const q = this.value.toLowerCase();
    renderCards(q ? partners.filter(p => (p.name||'').toLowerCase().includes(q)||(p.function||'').toLowerCase().includes(q)) : partners);
  });

  (async () => {
    try {
      const res = await fetch('/api/partners');
      if (!res.ok) throw new Error();
      partners = await res.json();
      document.getElementById('loading').style.display = 'none';
      document.getElementById('grid').style.display = '';
      renderCards(partners);
    } catch {
      document.getElementById('loading').innerHTML = '<p style="color:rgba(255,255,255,0.7);font-size:0.9rem;">Não foi possível carregar os dados.<br>Verifique as variáveis de ambiente.</p>';
    }
  })();
})();
</script>
</body>
</html>
