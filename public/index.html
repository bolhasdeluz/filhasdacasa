<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calendário de Sessões — Bolhas de Luz</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0b14;
    --surface: #171423;
    --surface2: #1e1a2e;
    --border: rgba(180,140,80,0.18);
    --gold: #c9963c;
    --gold-light: #e8bf72;
    --gold-dim: rgba(201,150,60,0.12);
    --text: #e8dcc8;
    --text-dim: rgba(232,220,200,0.55);
    --red: #b84040;
    --red-dim: rgba(184,64,64,0.12);

    --interna:   #4a6fa5;
    --atendimento: #6a9e6a;
    --visita:    #9e6a9e;
    --familia:   #c9963c;
    --reuniao:   #6a8fa5;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); color:var(--text); font-family:'Crimson Pro',Georgia,serif; font-size:17px; min-height:100vh; }

  /* HEADER */
  header { background:linear-gradient(180deg,#110e1c 0%,transparent 100%); border-bottom:1px solid var(--border); padding:20px 24px 18px; text-align:center; position:relative; }
  header::before { content:''; position:absolute; top:0;left:0;right:0; height:2px; background:linear-gradient(90deg,transparent,var(--gold),transparent); }
  .btn-back { display:inline-block; margin-bottom:12px; font-family:'Cinzel',serif; font-size:10px; letter-spacing:0.1em; color:var(--text-dim); text-decoration:none; border:1px solid var(--border); padding:5px 14px; border-radius:20px; transition:all 0.2s; }
  .btn-back:hover { border-color:var(--gold); color:var(--gold); }
  .header-ornament { font-size:13px; color:var(--gold); opacity:0.4; letter-spacing:12px; margin-bottom:5px; }
  h1 { font-family:'Cinzel',serif; font-size:clamp(20px,4vw,30px); font-weight:700; letter-spacing:0.08em; color:var(--gold-light); text-shadow:0 0 40px rgba(201,150,60,0.3); }
  .header-sub { font-size:10px; color:var(--text-dim); letter-spacing:0.18em; text-transform:uppercase; margin-top:4px; font-family:'Cinzel',serif; }

  /* CONTROLS */
  .controls { max-width:960px; margin:18px auto 0; padding:0 16px; display:flex; gap:8px; flex-wrap:wrap; align-items:center; }
  .filter-btn { background:var(--surface); border:1px solid var(--border); color:var(--text-dim); padding:8px 13px; border-radius:6px; cursor:pointer; font-family:'Cinzel',serif; font-size:9px; letter-spacing:0.08em; transition:all 0.2s; white-space:nowrap; display:flex; align-items:center; gap:5px; }
  .filter-btn:hover { border-color:var(--gold); color:var(--gold); }
  .filter-btn.active { background:var(--gold-dim); border-color:var(--gold); color:var(--gold-light); }
  .filter-btn .dot { width:7px; height:7px; border-radius:50%; flex-shrink:0; }
  .dot-interna { background:var(--interna); }
  .dot-atendimento { background:var(--atendimento); }
  .dot-visita { background:var(--visita); }
  .dot-familia { background:var(--familia); }
  .dot-reuniao { background:var(--reuniao); }
  .spacer { flex:1; }
  .btn-add { background:var(--gold); border:none; color:#0d0b14; padding:8px 18px; border-radius:6px; cursor:pointer; font-family:'Cinzel',serif; font-size:9px; letter-spacing:0.08em; font-weight:700; transition:all 0.2s; white-space:nowrap; }
  .btn-add:hover { background:var(--gold-light); }

  /* MAIN LAYOUT */
  .main { max-width:720px; margin:18px auto 60px; padding:0 16px; }

  /* SIDEBAR LIST */
  .sessoes-list { display:flex; flex-direction:column; gap:8px; }
  .mes-header { font-family:'Cinzel',serif; font-size:10px; letter-spacing:0.18em; color:var(--gold); text-transform:uppercase; padding:16px 2px 6px; border-bottom:1px solid var(--border); margin-bottom:2px; }
  .mes-header:first-child { padding-top:4px; }

  .sessao-item { background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:12px 14px; border-left:3px solid var(--gold); transition:all 0.2s; animation:fadeIn 0.25s ease both; }
  @keyframes fadeIn { from{opacity:0;transform:translateY(5px)} to{opacity:1;transform:translateY(0)} }
  .sessao-item:hover { border-color:rgba(201,150,60,0.35); }
  .sessao-item.tipo-interna { border-left-color:var(--interna); }
  .sessao-item.tipo-atendimento { border-left-color:var(--atendimento); }
  .sessao-item.tipo-visita { border-left-color:var(--visita); }
  .sessao-item.tipo-familia { border-left-color:var(--familia); }

  .si-header { display:flex; align-items:flex-start; justify-content:space-between; gap:8px; }
  .si-date { display:flex; align-items:center; gap:10px; margin-bottom:4px; }
  .si-day-num { font-family:'Cinzel',serif; font-size:22px; font-weight:700; color:var(--gold-light); line-height:1; }
  .si-day-info { display:flex; flex-direction:column; gap:1px; }
  .si-dow { font-family:'Cinzel',serif; font-size:9px; letter-spacing:0.12em; color:var(--gold); text-transform:uppercase; }
  .si-time { font-family:'Cinzel',serif; font-size:9px; color:var(--text-dim); letter-spacing:0.08em; }
  .si-name { font-family:'Cinzel',serif; font-size:13px; color:var(--gold-light); line-height:1.2; }
  .si-tipo { font-size:9px; font-family:'Cinzel',serif; letter-spacing:0.1em; text-transform:uppercase; margin-top:4px; opacity:0.7; }
  .si-tipo.tipo-interna { color:var(--interna); }
  .si-tipo.tipo-atendimento { color:var(--atendimento); }
  .si-tipo.tipo-visita { color:var(--visita); }
  .si-tipo.tipo-familia { color:var(--familia); }
  .si-desc { font-size:13px; color:var(--text-dim); margin-top:5px; font-style:italic; line-height:1.5; }
  .si-resp { font-size:12px; color:var(--text-dim); margin-top:4px; }
  .si-actions { display:flex; gap:4px; flex-shrink:0; }
  .icon-btn { background:none; border:1px solid var(--border); color:var(--text-dim); width:24px; height:24px; border-radius:4px; cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:11px; transition:all 0.18s; }
  .icon-btn:hover { border-color:var(--gold); color:var(--gold); }
  .icon-btn.del:hover { border-color:var(--red); color:var(--red); background:var(--red-dim); }

  .empty { text-align:center; padding:30px 20px; color:var(--text-dim); font-size:14px; }

  /* MODAL */
  .overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.72); z-index:100; align-items:center; justify-content:center; padding:16px; backdrop-filter:blur(4px); }
  .overlay.open { display:flex; }
  .modal { background:var(--surface2); border:1px solid var(--border); border-top:2px solid var(--gold); border-radius:12px; width:100%; max-width:480px; max-height:90vh; overflow-y:auto; padding:24px 20px; position:relative; }
  .modal h2 { font-family:'Cinzel',serif; font-size:16px; color:var(--gold-light); margin-bottom:18px; letter-spacing:0.06em; }
  .form-row { margin-bottom:13px; }
  label { display:block; font-family:'Cinzel',serif; font-size:9px; letter-spacing:0.14em; text-transform:uppercase; color:var(--text-dim); margin-bottom:5px; }
  input[type=text],input[type=date],input[type=time],input[type=password],textarea,select { width:100%; background:var(--bg); border:1px solid var(--border); color:var(--text); padding:9px 11px; border-radius:6px; font-family:'Crimson Pro',serif; font-size:16px; outline:none; transition:border-color 0.2s; }
  input:focus,textarea:focus,select:focus { border-color:var(--gold); }
  input[type=date]::-webkit-calendar-picker-indicator,
  input[type=time]::-webkit-calendar-picker-indicator {
    filter: invert(0.6) sepia(1) saturate(2) hue-rotate(5deg);
    cursor: pointer;
    opacity: 0.7;
  }
  input[type=date]::-webkit-calendar-picker-indicator:hover,
  input[type=time]::-webkit-calendar-picker-indicator:hover { opacity: 1; }

  textarea { resize:vertical; min-height:80px; line-height:1.6; }
  select option { background:#1e1a2e; }
  .row-2 { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  .modal-footer { display:flex; justify-content:flex-end; gap:8px; margin-top:18px; }
  .btn-cancel { background:none; border:1px solid var(--border); color:var(--text-dim); padding:8px 16px; border-radius:6px; cursor:pointer; font-family:'Cinzel',serif; font-size:9px; letter-spacing:0.08em; transition:all 0.2s; }
  .btn-cancel:hover { border-color:var(--red); color:var(--red); }
  .btn-save { background:var(--gold); border:none; color:#0d0b14; padding:8px 20px; border-radius:6px; cursor:pointer; font-family:'Cinzel',serif; font-size:9px; letter-spacing:0.08em; font-weight:700; transition:all 0.2s; }
  .btn-save:hover { background:var(--gold-light); }
  .btn-close-modal { position:absolute; top:14px; right:14px; background:none; border:1px solid var(--border); color:var(--text-dim); width:26px; height:26px; border-radius:4px; cursor:pointer; font-size:12px; display:flex; align-items:center; justify-content:center; transition:all 0.2s; }
  .btn-close-modal:hover { border-color:var(--red); color:var(--red); }
  .senha-err { color:#e07070; font-size:12px; margin-top:5px; display:none; }

  /* TOAST */
  .toast { position:fixed; bottom:20px; right:20px; background:var(--surface2); border:1px solid var(--gold); color:var(--gold-light); padding:9px 15px; border-radius:7px; font-family:'Cinzel',serif; font-size:10px; letter-spacing:.08em; z-index:200; opacity:0; transform:translateY(8px); transition:all .25s; pointer-events:none; }
  .toast.show { opacity:1; transform:translateY(0); }

  .btn-agenda { display:inline-flex; align-items:center; gap:5px; margin-top:8px; background:rgba(201,150,60,0.08); border:1px solid rgba(201,150,60,0.25); color:var(--gold); padding:5px 12px; border-radius:5px; text-decoration:none; font-family:'Cinzel',serif; font-size:9px; letter-spacing:0.1em; cursor:pointer; transition:all 0.2s; }
  .btn-agenda:hover { background:rgba(201,150,60,0.16); border-color:var(--gold); }
  .tambor-badge { display:inline-flex; align-items:center; gap:4px; margin-top:5px; font-family:'Cinzel',serif; font-size:9px; letter-spacing:0.08em; padding:2px 9px; border-radius:20px; }
  .tambor-confirmado { background:rgba(106,158,106,0.12); border:1px solid rgba(106,158,106,0.3); color:#8ecf8e; }
  .tambor-arrecadacao { background:rgba(201,150,60,0.12); border:1px solid rgba(201,150,60,0.3); color:var(--gold); }
  .tambor-nao { background:rgba(184,64,64,0.1); border:1px solid rgba(184,64,64,0.25); color:#e07070; }
  .btn-import { background:none; border:1px solid var(--border); color:var(--text-dim); padding:8px 14px; border-radius:6px; cursor:pointer; font-family:'Cinzel',serif; font-size:9px; letter-spacing:0.08em; transition:all 0.2s; white-space:nowrap; }
  .btn-import:hover { border-color:var(--gold); color:var(--gold); }
  .import-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.75); z-index:200; align-items:center; justify-content:center; padding:16px; backdrop-filter:blur(4px); }
  .import-overlay.open { display:flex; }
  .import-modal { background:var(--surface2); border:1px solid var(--border); border-top:2px solid var(--gold); border-radius:12px; width:100%; max-width:560px; max-height:85vh; display:flex; flex-direction:column; padding:22px 20px; position:relative; }
  .import-modal h2 { font-family:'Cinzel',serif; font-size:15px; color:var(--gold-light); margin-bottom:6px; letter-spacing:0.06em; }
  .import-sub { font-size:13px; color:var(--text-dim); margin-bottom:14px; }
  .import-list { overflow-y:auto; flex:1; display:flex; flex-direction:column; gap:5px; margin-bottom:14px; }
  .import-item { background:var(--bg); border:1px solid var(--border); border-radius:6px; padding:8px 12px; display:flex; align-items:center; gap:10px; font-size:13px; }
  .import-item input[type=checkbox] { accent-color:var(--gold); width:15px; height:15px; flex-shrink:0; cursor:pointer; }
  .import-item-info { flex:1; min-width:0; }
  .import-item-name { color:var(--text); font-family:'Cinzel',serif; font-size:11px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .import-item-date { color:var(--text-dim); font-size:11px; margin-top:1px; }
  .import-footer { display:flex; align-items:center; gap:10px; flex-wrap:wrap; }
  .import-senha { flex:1; min-width:140px; background:var(--bg); border:1px solid var(--border); color:var(--text); padding:8px 11px; border-radius:6px; font-family:'Crimson Pro',serif; font-size:15px; outline:none; }
  .import-senha:focus { border-color:var(--gold); }
  .import-count { font-family:'Cinzel',serif; font-size:9px; color:var(--text-dim); letter-spacing:0.08em; }
  .btn-sel-all { background:none; border:1px solid var(--border); color:var(--text-dim); padding:6px 12px; border-radius:5px; cursor:pointer; font-family:'Cinzel',serif; font-size:9px; letter-spacing:0.06em; transition:all 0.2s; }
  .btn-sel-all:hover { border-color:var(--gold); color:var(--gold); }
  .loading { text-align:center; padding:40px; color:var(--text-dim); }
  .spinner { width:20px; height:20px; border:2px solid var(--border); border-top-color:var(--gold); border-radius:50%; animation:spin .8s linear infinite; margin:0 auto 10px; }
  @keyframes spin { to{transform:rotate(360deg)} }
</style>
</head>
<body>

<header>
  <a href="https://www.bolhasdeluz.com/" class="btn-back">← Voltar ao site do terreiro</a>
  <div class="header-ornament">✦ ✦ ✦</div>
  <h1>Calendário de Sessões</h1>
  <div class="header-sub">Terreiro de Umbanda e Quimbanda Bolhas de Luz</div>
</header>

<div class="controls">
  <button class="filter-btn active" id="fTodos" onclick="setFiltro('')">Todos</button>
  <button class="filter-btn" id="fInterna" onclick="setFiltro('Interna')"><span class="dot dot-interna"></span>Internas</button>
  <button class="filter-btn" id="fAtendimento" onclick="setFiltro('Atendimento')"><span class="dot dot-atendimento"></span>Atendimento</button>
  <button class="filter-btn" id="fVisita" onclick="setFiltro('Visita')"><span class="dot dot-visita"></span>Visita</button>
  <button class="filter-btn" id="fFamilia" onclick="setFiltro('Familia')"><span class="dot dot-familia"></span>Família</button>
  <button class="filter-btn" id="fReuniao" onclick="setFiltro('Reuniao')"><span class="dot dot-reuniao"></span>Reunião</button>
  <div class="spacer"></div>
  <input type="file" id="icsInput" accept=".ics" style="display:none" onchange="importarICS(this)">
  <button class="btn-import" onclick="document.getElementById('icsInput').click()">⬆ Importar .ics</button>
  <button class="btn-add" onclick="openModal()">+ Nova Sessão</button>
</div>

<div class="main">
  <div class="sessoes-list" id="sidebarList">
    <div class="loading"><div class="spinner"></div></div>
  </div>
</div>

<!-- MODAL -->
<div class="overlay" id="overlay">
  <div class="modal">
    <button class="btn-close-modal" onclick="closeModal()">✕</button>
    <h2 id="modalTitle">Nova Sessão</h2>
    <input type="hidden" id="editId">

    <div class="form-row">
      <label>Nome da Sessão *</label>
      <input type="text" id="fNome" placeholder="ex: Gira de Pretos Velhos...">
    </div>
    <div class="row-2">
      <div class="form-row">
        <label>Data *</label>
        <input type="date" id="fData">
      </div>
      <div class="form-row">
        <label>Hora</label>
        <input type="time" id="fHora">
      </div>
    </div>
    <div class="form-row">
      <label>Tipo de Sessão *</label>
      <select id="fTipo">
        <option value="">— Selecionar —</option>
        <option value="Interna">Sessão Interna</option>
        <option value="Atendimento">Sessão com Atendimento</option>
        <option value="Visita">Sessão de Visita</option>
        <option value="Familia">Sessão da Família</option>
        <option value="Reuniao">Reunião</option>
      </select>
    </div>
    <div class="form-row">
      <label>Descrição / Observações</label>
      <textarea id="fDesc" placeholder="Detalhes, avisos, o que levar..."></textarea>
    </div>
    <div class="form-row">
      <label>Responsável</label>
      <input type="text" id="fResp" placeholder="Quem organiza essa sessão...">
    </div>
    <div class="form-row">
      <label>Tambor</label>
      <select id="fTambor">
        <option value="">— Sem informação —</option>
        <option value="confirmado">✅ Confirmado</option>
        <option value="arrecadacao">🪘 Depende de arrecadação extra</option>
        <option value="nao">❌ Não vai ter</option>
      </select>
    </div>
    <div class="form-row">
      <label>Senha</label>
      <input type="password" id="fSenha" placeholder="Digite a senha do terreiro">
      <div class="senha-err" id="senhaErr">Senha incorreta, tente novamente.</div>
    </div>

    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeModal()">Cancelar</button>
      <button class="btn-save" onclick="salvar()">Salvar Sessão</button>
    </div>
  </div>
</div>

<!-- IMPORT MODAL -->
<div class="import-overlay" id="importOverlay">
  <div class="import-modal">
    <button class="btn-close-modal" onclick="fecharImport()">✕</button>
    <h2>Importar do Google Calendar</h2>
    <div class="import-sub" id="importSub">Carregando eventos...</div>
    <div class="import-list" id="importList"></div>
    <div style="display:flex;gap:8px;margin-bottom:10px;align-items:center">
      <button class="btn-sel-all" onclick="selecionarTodos(true)">Selecionar todos</button>
      <button class="btn-sel-all" onclick="selecionarTodos(false)">Desmarcar todos</button>
      <span class="import-count" id="importCount"></span>
    </div>
    <div class="import-footer">
      <input type="password" class="import-senha" id="importSenha" placeholder="Senha do terreiro">
      <button class="btn-cancel" onclick="fecharImport()">Cancelar</button>
      <button class="btn-save" onclick="confirmarImport()">Importar selecionados</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  const API = '/api/sessoes';
  let sessoes = [];
  let filtroTipo = '';
  let selectedDate = null;

  const hoje = new Date();
  let viewYear = hoje.getFullYear();
  let viewMonth = hoje.getMonth();

  const MESES = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
  const TIPO_LABEL = { Interna:'Sessão Interna', Atendimento:'Sessão com Atendimento', Visita:'Sessão de Visita', Familia:'Sessão da Família', Reuniao:'Reunião' };


  // ---- IMPORTAR ICS ----
  let importEventos = [];

  window.importarICS = (input) => {
    const file = input.files[0];
    if (!file) return;
    input.value = '';
    const reader = new FileReader();
    reader.onload = (e) => {
      importEventos = parseICS(e.target.result);
      mostrarImport();
    };
    reader.readAsText(file);
  };

  function parseICS(text) {
    const eventos = [];
    const blocks = text.split('BEGIN:VEVENT');
    const hoje = new Date();
    hoje.setHours(0,0,0,0);

    for (let i = 1; i < blocks.length; i++) {
      const block = blocks[i];

      const get = (key) => {
        const match = block.match(new RegExp(key + '[^:]*:([^\r\n]+)'));
        return match ? match[1].trim() : '';
      };

      const summary = get('SUMMARY') || 'Sem título';
      const desc = get('DESCRIPTION');
      const dtstart = get('DTSTART');
      const rrule = get('RRULE');

      if (!dtstart) continue;

      const datas = expandirDatas(dtstart, rrule, hoje);

      datas.forEach(data => {
        const hora = extrairHora(dtstart);
        eventos.push({ nome: summary, data, hora, descricao: desc, tipo: '', tambor: '' });
      });
    }

    // Sort by date and remove duplicates
    eventos.sort((a,b) => a.data.localeCompare(b.data));
    return eventos;
  }

  function extrairHora(dtstart) {
    // DTSTART;TZID=...:20260101T210000 or DTSTART:20260101T210000Z
    const t = dtstart.replace(/.*:/, '');
    if (t.length >= 15) {
      const h = t.slice(9,11);
      const m = t.slice(11,13);
      if (h && m && !isNaN(h) && !isNaN(m)) return `${h}:${m}`;
    }
    return '';
  }

  function expandirDatas(dtstart, rrule, hoje) {
    const dataBase = parseDTSTART(dtstart);
    if (!dataBase) return [];

    const datas = [];
    const limite = new Date(hoje);
    limite.setMonth(limite.getMonth() + 18); // próximos 18 meses

    if (!rrule) {
      if (dataBase >= hoje) datas.push(fmtDate(dataBase));
      return datas;
    }

    const freq = (rrule.match(/FREQ=([^;]+)/) || [])[1];
    const untilStr = (rrule.match(/UNTIL=([^;]+)/) || [])[1];
    const until = untilStr ? parseDTSTART(untilStr) : limite;
    const intervalMatch = rrule.match(/INTERVAL=(\d+)/);
    const interval = intervalMatch ? parseInt(intervalMatch[1]) : 1;

    const cur = new Date(dataBase);

    for (let iter = 0; iter < 200; iter++) {
      if (cur > limite || (until && cur > until)) break;
      if (cur >= hoje) datas.push(fmtDate(cur));

      if (freq === 'YEARLY') cur.setFullYear(cur.getFullYear() + interval);
      else if (freq === 'MONTHLY') cur.setMonth(cur.getMonth() + interval);
      else if (freq === 'WEEKLY') cur.setDate(cur.getDate() + 7 * interval);
      else if (freq === 'DAILY') cur.setDate(cur.getDate() + interval);
      else break;
    }

    return datas;
  }

  function parseDTSTART(s) {
    // Remove prefix like TZID=...: 
    const raw = s.replace(/.*:/, '').replace(/Z$/, '');
    if (raw.length < 8) return null;
    const y = parseInt(raw.slice(0,4));
    const m = parseInt(raw.slice(4,6)) - 1;
    const d = parseInt(raw.slice(6,8));
    return new Date(y, m, d);
  }

  function mostrarImport() {
    document.getElementById('importOverlay').classList.add('open');
    document.getElementById('importSub').textContent = `${importEventos.length} eventos futuros encontrados. Selecione os que deseja importar:`;
    atualizarListaImport();
  }

  function atualizarListaImport() {
    const list = document.getElementById('importList');
    if (importEventos.length === 0) {
      list.innerHTML = '<div class="empty">Nenhum evento futuro encontrado no arquivo.</div>';
      return;
    }
    list.innerHTML = importEventos.map((ev, i) => {
      const [y,m,d] = ev.data.split('-');
      return `<div class="import-item">
        <input type="checkbox" id="imp${i}" checked onchange="atualizarContador()">
        <div class="import-item-info">
          <div class="import-item-name">${esc(ev.nome)}</div>
          <div class="import-item-date">${d}/${m}/${y}${ev.hora ? ' · ' + ev.hora : ''}</div>
        </div>
      </div>`;
    }).join('');
    atualizarContador();
  }

  function atualizarContador() {
    const total = importEventos.length;
    const selecionados = document.querySelectorAll('#importList input:checked').length;
    document.getElementById('importCount').textContent = `${selecionados} de ${total} selecionados`;
  }

  window.selecionarTodos = (val) => {
    document.querySelectorAll('#importList input[type=checkbox]').forEach(c => c.checked = val);
    atualizarContador();
  };

  window.fecharImport = () => {
    document.getElementById('importOverlay').classList.remove('open');
    document.getElementById('importSenha').value = '';
  };

  window.confirmarImport = async () => {
    const senha = document.getElementById('importSenha').value;
    if (!senha) { alert('Digite a senha do terreiro.'); return; }

    const checkboxes = document.querySelectorAll('#importList input[type=checkbox]');
    const selecionados = importEventos.filter((_, i) => checkboxes[i]?.checked);
    if (selecionados.length === 0) { alert('Selecione ao menos um evento.'); return; }

    const btn = document.querySelector('.import-overlay .btn-save');
    btn.textContent = 'Importando...';
    btn.disabled = true;

    let ok = 0, err = 0;
    for (const ev of selecionados) {
      try {
        const res = await fetch(API, {
          method: 'POST',
          headers: {'Content-Type':'application/json'},
          body: JSON.stringify({ ...ev, senha })
        });
        if (res.status === 403) { alert('Senha incorreta.'); btn.textContent='Importar selecionados'; btn.disabled=false; return; }
        if (res.ok) { const j = await res.json(); sessoes.push(j); ok++; }
        else err++;
      } catch { err++; }
    }

    sessoes.sort((a,b)=>a.data.localeCompare(b.data));
    fecharImport();
    renderLista();
    btn.textContent = 'Importar selecionados';
    btn.disabled = false;
    toast(`${ok} sessão(ões) importada(s)!${err ? ' ' + err + ' erros.' : ''}`);
  };


  function gerarICS(id) {
    const s = sessoes.find(x => x.id === id);
    if (!s) return;
    const [y, m, d] = s.data.split('-');
    const hora = s.hora || '20:30';
    const [h, min] = hora.split(':');
    const pad = n => String(n).padStart(2,'0');
    const dtstart = `${y}${pad(m)}${pad(d)}T${pad(h)}${pad(min)}00`;
    const endH = String(parseInt(h) + 2).padStart(2,'0');
    const dtend = `${y}${pad(m)}${pad(d)}T${endH}${pad(min)}00`;
    const TAMBOR_L = {confirmado:'Tambor: Confirmado', arrecadacao:'Tambor: Depende de arrecadacao', nao:'Tambor: Nao vai ter'};
    const desc = [
      s.tipo ? ('Tipo: ' + (TIPO_LABEL[s.tipo]||s.tipo)) : '',
      s.tambor ? (TAMBOR_L[s.tambor]||'') : '',
      s.responsavel ? ('Responsavel: ' + s.responsavel) : '',
      s.descricao || ''
    ].filter(Boolean).join('\\n');
    const CRLF = '\r\n';
    const ics = [
      'BEGIN:VCALENDAR',
      'VERSION:2.0',
      'PRODID:-//Bolhas de Luz//Calendario//PT',
      'BEGIN:VEVENT',
      'DTSTART;TZID=America/Sao_Paulo:' + dtstart,
      'DTEND;TZID=America/Sao_Paulo:' + dtend,
      'SUMMARY:' + s.nome,
      'DESCRIPTION:' + desc,
      'LOCATION:Terreiro Bolhas de Luz',
      'UID:' + s.id + '@bolhasdeluz',
      'END:VEVENT',
      'END:VCALENDAR'
    ].join(CRLF);
    const blob = new Blob([ics], { type: 'text/calendar;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = s.nome.replace(/[^a-z0-9]/gi, '-') + '.ics';
    a.click();
    URL.revokeObjectURL(url);
  }
  window.gerarICS = gerarICS;

  // ---- LOAD ----
  async function load() {
    try {
      const res = await fetch(API);
      sessoes = await res.json();
      renderLista();
    } catch(e) {
      document.getElementById('sidebarList').innerHTML = '<div class="empty">Erro ao carregar.</div>';
    }
  }

  // ---- FILTRO ----
  window.setFiltro = (tipo) => {
    filtroTipo = tipo;
    selectedDate = null;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    const map = {'':'fTodos','Interna':'fInterna','Atendimento':'fAtendimento','Visita':'fVisita','Familia':'fFamilia','Reuniao':'fReuniao'};
    document.getElementById(map[tipo]).classList.add('active');
    renderLista();
  };

  // ---- CALENDÁRIO (removido) ----
  window.mudarMes = (d) => {
    viewMonth += d;
    if (viewMonth > 11) { viewMonth = 0; viewYear++; }
    if (viewMonth < 0)  { viewMonth = 11; viewYear--; }
    selectedDate = null;
    renderLista();
  };


  function selectDay(dateStr) {
    selectedDate = selectedDate === dateStr ? null : dateStr;
    renderLista();
  }

  // ---- LISTA LATERAL ----
  const DIAS_SEMANA = ['Domingo','Segunda-feira','Terça-feira','Quarta-feira','Quinta-feira','Sexta-feira','Sábado'];
  const TAMBOR_LABEL = { confirmado:'✅ Tambor confirmado', arrecadacao:'🪘 Depende de arrecadação', nao:'❌ Sem tambor' };

  function renderLista() {
    const todayStr = fmtDate(hoje);
    let lista = sessoes.filter(s => {
      if (filtroTipo && s.tipo !== filtroTipo) return false;
      return s.data >= todayStr;
    });

    const el = document.getElementById('sidebarList');
    if (lista.length === 0) {
      el.innerHTML = '<div class="empty">Nenhuma sessão encontrada.</div>';
      return;
    }

    // Agrupa por mês
    const grupos = {};
    lista.forEach(s => {
      const mesKey = s.data.slice(0, 7);
      if (!grupos[mesKey]) grupos[mesKey] = [];
      grupos[mesKey].push(s);
    });

    let html = '';
    Object.keys(grupos).sort().forEach(mesKey => {
      const [y, m] = mesKey.split('-');
      html += `<div class="mes-header">${MESES[parseInt(m)-1]} ${y}</div>`;
      grupos[mesKey].forEach(s => {
        const [sy, sm, sd] = s.data.split('-');
        const dataObj = new Date(parseInt(sy), parseInt(sm)-1, parseInt(sd));
        const dow = DIAS_SEMANA[dataObj.getDay()];
        const tipoClass = 'tipo-' + (s.tipo||'').toLowerCase();
        html += `
        <div class="sessao-item ${tipoClass}">
          <div class="si-header">
            <div style="display:flex;gap:12px;align-items:center;flex:1;min-width:0">
              <div class="si-date">
                <div class="si-day-num">${sd}</div>
                <div class="si-day-info">
                  <div class="si-dow">${dow}</div>
                  <div class="si-time">${s.hora||''}</div>
                </div>
              </div>
              <div style="flex:1;min-width:0">
                <div class="si-name">${esc(s.nome)}</div>
                <div class="si-tipo ${tipoClass}">${TIPO_LABEL[s.tipo]||s.tipo||''}</div>
                ${s.tambor ? `<div class="tambor-badge tambor-${s.tambor}">${TAMBOR_LABEL[s.tambor]||''}</div>` : ''}
              </div>
            </div>
            <div class="si-actions">
              <button class="icon-btn" onclick="openEdit('${s.id}')" title="Editar">✎</button>
              <button class="icon-btn del" onclick="deletar('${s.id}')" title="Excluir">✕</button>
            </div>
          </div>
          ${s.descricao ? `<div class="si-desc">${esc(s.descricao)}</div>` : ''}
          ${s.responsavel ? `<div class="si-resp">Resp.: ${esc(s.responsavel)}</div>` : ''}
        <button class="btn-agenda" onclick="gerarICS('${s.id}')">📅 Adicionar à agenda</button>
        </div>`;
      });
    });

    el.innerHTML = html;
  }

  // ---- MODAL ----
  window.openModal = () => {
    document.getElementById('modalTitle').textContent = 'Nova Sessão';
    document.getElementById('editId').value = '';
    document.getElementById('fNome').value = '';
    document.getElementById('fData').value = selectedDate || fmtDate(hoje);
    document.getElementById('fHora').value = '20:30';
    document.getElementById('fTipo').value = filtroTipo || '';
    document.getElementById('fDesc').value = '';
    document.getElementById('fResp').value = '';
    document.getElementById('fTambor').value = '';
    document.getElementById('fSenha').value = '';
    document.getElementById('senhaErr').style.display = 'none';
    document.getElementById('overlay').classList.add('open');
  };

  window.openEdit = (id) => {
    const s = sessoes.find(x => x.id === id);
    if (!s) return;
    document.getElementById('modalTitle').textContent = 'Editar Sessão';
    document.getElementById('editId').value = id;
    document.getElementById('fNome').value = s.nome||'';
    document.getElementById('fData').value = s.data||'';
    document.getElementById('fHora').value = s.hora||'';
    document.getElementById('fTipo').value = s.tipo||'';
    document.getElementById('fDesc').value = s.descricao||'';
    document.getElementById('fResp').value = s.responsavel||'';
    document.getElementById('fTambor').value = s.tambor||'';
    document.getElementById('fSenha').value = '';
    document.getElementById('senhaErr').style.display = 'none';
    document.getElementById('overlay').classList.add('open');
  };

  window.closeModal = () => document.getElementById('overlay').classList.remove('open');

  window.salvar = async () => {
    const nome = document.getElementById('fNome').value.trim();
    const data = document.getElementById('fData').value;
    const tipo = document.getElementById('fTipo').value;
    if (!nome || !data || !tipo) { alert('Preencha nome, data e tipo.'); return; }

    const payload = {
      nome, data,
      hora: document.getElementById('fHora').value,
      tipo,
      descricao: document.getElementById('fDesc').value.trim(),
      responsavel: document.getElementById('fResp').value.trim(),
      tambor: document.getElementById('fTambor').value,
      senha: document.getElementById('fSenha').value,
    };

    const editId = document.getElementById('editId').value;
    const method = editId ? 'PUT' : 'POST';
    if (editId) payload.id = editId;

    const res = await fetch(API, { method, headers:{'Content-Type':'application/json'}, body:JSON.stringify(payload) });
    const json = await res.json();

    if (res.status === 403) {
      document.getElementById('senhaErr').style.display = 'block';
      return;
    }

    if (editId) {
      const idx = sessoes.findIndex(x=>x.id===editId);
      if (idx>=0) sessoes[idx] = json;
    } else {
      sessoes.push(json);
      sessoes.sort((a,b)=>a.data.localeCompare(b.data));
    }

    closeModal();
    renderLista();
    toast(editId ? 'Sessão atualizada!' : 'Sessão adicionada!');
  };

  window.deletar = async (id) => {
    const senha = prompt('Digite a senha para excluir:');
    if (senha === null) return;
    const res = await fetch(API, { method:'DELETE', headers:{'Content-Type':'application/json'}, body:JSON.stringify({id, senha}) });
    if (res.status === 403) { alert('Senha incorreta.'); return; }
    sessoes = sessoes.filter(x=>x.id!==id);
    renderLista();
    toast('Sessão excluída');
  };

  // ---- UTILS ----
  function fmtDate(d) { return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
  function esc(s) { if(!s)return''; return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  function toast(msg) { const el=document.getElementById('toast'); el.textContent=msg; el.classList.add('show'); setTimeout(()=>el.classList.remove('show'),2400); }

  document.getElementById('overlay').addEventListener('click', e => { if(e.target===document.getElementById('overlay'))closeModal(); });

  load();
</script>
</body>
</html>
